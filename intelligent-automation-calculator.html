    <script>
  function calculate() {
    const employees = document.getElementById('employees').value;
    const wage = document.getElementById('wage').value;
    const hoursSaved = document.getElementById('hoursSaved').value;
    const weeks = document.getElementById('weeks').value;
    const efficiencyFactor = 0.7;
    if (!employees || !wage || !hoursSaved || !weeks) {
      document.getElementById('result').innerHTML = 'Please fill in all fields.';
      return;
    }
    const annualSavings = employees * wage * hoursSaved * weeks * efficiencyFactor;
    document.getElementById('result').innerHTML = `Estimated Annual Cost Savings: $${annualSavings.toFixed(2)}`;
  }
</script>
